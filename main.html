<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./main.css">  
</head>
  <body>
    <div class="header">
        <h3>Expense <br>
        Tracker <img src="./images/p-4.jpg" style="border-radius: 50%;" alt="" width="35px"></h3>
    </div>
    <div class="form mt-4">
       <div class="form-floating input">
      <input type="date" class="form-control dateinp" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput">Date</label>
      </div>
      <div class="form-floating input">
      <input type="number" class="form-control amountinp" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput">Amount</label>
      </div>
      <select class="form-select input types transactionType" aria-label="Default select example">
        <option selected>Transaction Type</option>
        <option value="veyadam">Add</option>
        <option value="teyadam">Remove</option>
      </select>
      <button class="btn btn-primary add" onclick="display();" >+</button>
    </div>
    <div class="card-box mt-5 ">
      <div class="card" >
      <div class="card-body">
        <h5 class="card-title">Total Added Amount
          <img src="./images/wallet-icon.jpg" alt="" width="35px">
        </h5>
        <img src="./images/rupee.jpg" alt="" width="35px">
        <span id="vesinavi">0</span>
      </div>
    </div>
    <div class="card" >
      <div class="card-body">
        <h5 class="card-title">Total Removed Amount
          <img src="./images/wallet-icon.jpg" alt="" width="35px">
        </h5>
        <img src="./images/rupee.jpg" alt="" width="35px">
        <span id="tesinavi">0</span>
      </div>
    </div>
    <div class="card" >
      <div class="card-body">
        <h5 class="card-title">Present Amount
          <img src="./images/wallet-icon.jpg" alt="" width="35px">
        </h5>
        <img src="./images/rupee.jpg" alt="" width="35px">
        <span id="unnavi">0</span>
      </div>
    </div>
    </div>
    <table class="table" id="table">
        <tr >
        <th id="th">Amount</th>
        <th>Transation Type</th>
        <th>Transation date</th>
        <th>Delete</th>
        </tr>
    </table>

    <script>
      let table=document.getElementById('table')
    function display(){
    let dateinp=document.getElementsByClassName('dateinp')[0].value
    let amountinp=document.getElementsByClassName('amountinp')[0].value
    let transactionType=document.getElementsByClassName('transactionType')[0].value
        let row=document.createElement('tr')
        let amountCell=document.createElement('td')
        amountCell.innerText=amountinp;
        let dateCell=document.createElement('td')
        dateCell.innerText=dateinp;
        let transaction=document.createElement('td')
        transaction.innerText=transactionType;
        let dButton=document.createElement('td')
        let button=document.createElement('button')
        let img=document.createElement('img')
        img.src="delete-removebg-preview.png"
        img.style.width="45px"
        button.appendChild(img)
        button.style.width="40px"
        button.style.height="40px"
        button.style.transform='translateX(8px)'
        button.style.display='flex'
        button.style.alignContent='center'
        button.onclick=()=>deletRow(row)
        dButton.appendChild(button)
        row.appendChild(amountCell)
        row.appendChild(transaction)
        row.appendChild(dateCell)
        row.appendChild(dButton)
        row.style.border="1px solid black"
        table.appendChild(row)
        let totalAmounut=document.getElementById('vesinavi').innerText
        let totalExpenses=document.getElementById('tesinavi').innerText
        let balance=document.getElementById('unnavi').innerText
        if(transactionType=='veyadam'){
          if(totalAmounut=='0'){
            document.getElementById('vesinavi').innerText=amountinp
          }
          else{
            document.getElementById('vesinavi').innerText=parseInt(totalAmounut)+parseInt(amountinp)
          }
          if(balance=='0'){
            document.getElementById('unnavi').innerText=amountinp
          }else{
            document.getElementById('unnavi').innerText=parseInt(balance)+parseInt(amountinp)
          }
        }
        else if(transactionType=='teyadam'){
          if(totalExpenses=='0'){
            document.getElementById('tesinavi').innerText=-(amountinp)
          }
          else{
            document.getElementById('tesinavi').innerText=parseInt(totalExpenses)-parseInt(amountinp)
          }
          if(balance=='0'){
            document.getElementById('unnavi').innerText=-(amountinp)
          }else{
            document.getElementById('unnavi').innerText=parseInt(balance)-parseInt(amountinp)
          }
          
        }
    }
    function deletRow(row){
      row.remove();
    }
    
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.min.js" integrity="sha384-RuyvpeZCxMJCqVUGFI0Do1mQrods/hhxYlcVfGPOfQtPJh0JCw12tUAZ/Mv10S7D" crossorigin="anonymous"></script>
    <script type="module" src="./main.js">

    </script>
  </body>
</html>
